<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Tema 2: Credit Card Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">💳 MiBanco Virtual</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Mis Tarjetas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Soporte</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 d-flex justify-content-center align-items-center min-vh-100">
        <div class="row w-100 justify-content-center">
            
            <div class="col-md-5 mb-4 d-flex justify-content-center position-relative">
                <div class="credit-card glass-panel water-effect" id="creditCard">
                    <div class="card-logos d-flex justify-content-between align-items-start">
                        <img src="https://cdn-icons-png.flaticon.com/512/6404/6404100.png" alt="Chip" class="chip-icon">
                        <div id="cardBrandLogo" class="brand-logo fw-bold fs-3 fst-italic text-white">VISA</div>
                    </div>
                    <div class="card-number mt-4" id="cardNumberDisplay">#### #### #### ####</div>
                    <div class="card-details d-flex justify-content-between mt-4">
                        <div class="card-holder">
                            <small>Titular</small>
                            <div id="cardNameDisplay">NOMBRE APELLIDO</div>
                        </div>
                        <div class="card-expiry">
                            <small>Expira</small>
                            <div id="cardExpiryDisplay">MM/YY</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="form-container glass-panel p-4" id="checkoutForm">
                    <h4 class="text-white mb-4">Detalles de Pago</h4>
                    
                    <div class="mb-3 text-white">
                        <label class="form-label d-block">Tipo de Tarjeta</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cardType" id="visaRadio" value="VISA" checked>
                            <label class="form-check-label" for="visaRadio">Visa</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="cardType" id="masterRadio" value="MASTERCARD">
                            <label class="form-check-label" for="masterRadio">Mastercard</label>
                        </div>
                    </div>

                    <div class="mb-3 position-relative">
                        <label class="text-white">Número de Tarjeta</label>
                        <input type="text" class="form-control glass-input" id="cardNumberInput" maxlength="16" placeholder="1234 5678 9876 5432">
                    </div>
                    <div class="mb-3">
                        <label class="text-white">Nombre del Titular</label>
                        <input type="text" class="form-control glass-input" id="cardNameInput" placeholder="Juan Pérez">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="text-white">Expiración</label>
                            <input type="text" class="form-control glass-input" id="cardExpiryInput" maxlength="5" placeholder="12/28">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="text-white">CVV</label>
                            <input type="password" class="form-control glass-input" maxlength="3" placeholder="123">
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-3 pay-btn" id="payButton">Pagar Ahora</button>
                </div>

                <div class="glass-panel p-5 text-center text-white" id="loadingScreen" style="display: none;">
                    <h5 id="loadingText">Verificando datos bancarios...</h5>
                    <div class="progress mt-4" style="height: 25px; background: rgba(0,0,0,0.3);">
                        <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" id="progressBar" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>

                <div class="glass-panel p-5 text-center text-white" id="successScreen" style="display: none;">
                    <h2 class="mb-3">💸</h2>
                    <h4 id="successMessage" class="fw-bold"></h4>
                    <button class="btn btn-outline-light mt-4" onclick="location.reload()">Hacer otra compra</button>
                </div>
            </div>

        </div>
    </main>

    <footer class="glass-footer text-center text-white py-3 mt-auto">
        <div class="container">
            <p class="mb-0">Desarrollado por: <strong>[Tu Nombre/Matrícula Aquí]</strong></p>
            <small>Examen Tema 2: HTML, XML y CSS - Entorno Ficticio Escolar</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
